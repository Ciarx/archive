<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/my-favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/my-favicon/favicon.svg" />
    <link rel="shortcut icon" href="/my-favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/my-favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Ciaran" />
    <link rel="manifest" href="/my-favicon/site.webmanifest" />
    <title>Ciaran Woods</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #87ceeb 0%, #e07b39 50%, #a52a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Concentric Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            border: 2px dotted #fff;
            animation: pulse 6s infinite ease-in-out;
        }

        .circle1 { width: 100px; height: 100px; animation-delay: 0s; }
        .circle2 { width: 200px; height: 200px; animation-delay: 1s; }
        .circle3 { width: 300px; height: 300px; animation-delay: 2s; }
        .circle4 { width: 400px; height: 400px; animation-delay: 3s; border-color: #d9a05b; }
        .circle5 { width: 500px; height: 500px; animation-delay: 4s; border-color: #8c552b; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Connecting Lines */
        .lines {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(90deg, #fff 0, #fff 5px, transparent 5px, transparent 10px);
            animation: flow 15s infinite linear;
        }

        .line1 { top: 20%; animation-delay: 0s; }
        .line2 { top: 40%; animation-delay: 3s; }
        .line3 { top: 60%; animation-delay: 6s; }
        .line4 { top: 80%; animation-delay: 9s; }

        @keyframes flow {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100px); }
        }

        /* Dot Pattern Background */
        .dots {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #fff 1px, transparent 2px),
                        radial-gradient(circle, #d9a05b 1px, transparent 2px),
                        radial-gradient(circle, #8c552b 1px, transparent 2px);
            background-size: 30px 30px, 40px 40px, 50px 50px;
            background-position: 0 0, 15px 15px, 25px 25px;
            opacity: 0.4;
            animation: shimmer 8s infinite alternate;
        }

        @keyframes shimmer {
            0% { opacity: 0.4; }
            100% { opacity: 0.6; }
        }

        /* Abstract Shapes */
        .shapes {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: 2;
        }

        .shape {
            position: absolute;
            border: 1px solid #fff;
            opacity: 0.6;
            animation: rotate 20s infinite linear;
        }

        .shape1 {
            width: 100px;
            height: 100px;
            top: 0;
            left: 0;
            transform: rotate(45deg);
        }

        .shape2 {
            width: 150px;
            height: 150px;
            top: 200px;
            left: 200px;
            transform: rotate(30deg);
        }

        .shape3 {
            width: 200px;
            height: 200px;
            top: 400px;
            left: 400px;
            transform: rotate(60deg);
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dots"></div>
        <div class="lines">
            <div class="line line1"></div>
            <div class="line line2"></div>
            <div class="line line3"></div>
            <div class="line line4"></div>
        </div>
        <div class="shapes">
            <div class="shape shape1"></div>
            <div class="shape shape2"></div>
            <div class="shape shape3"></div>
        </div>
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
        <div class="circle circle4"></div>
        <div class="circle circle5"></div>
    </div>
</body>
</html>
